<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Expense Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        h1 {
            text-align: center;
            color: white;
            font-size: 32px;
            margin-bottom: 24px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            padding: 24px;
            margin: 16px 0;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(0,0,0,0.15);
        }

        .card h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 12px;
        }

        .amount {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 8px 0;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
        }

        .transaction {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .transaction:last-child { border-bottom: none; }

        .transaction-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .transaction-details { flex: 1; }

        .transaction-title {
            font-weight: 600;
            font-size: 16px;
            color: #333;
            margin-bottom: 4px;
        }

        .transaction-meta {
            font-size: 13px;
            color: #999;
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 18px;
            color: #333;
        }

        .category-item {
            display: flex;
            align-items: center;
            margin: 16px 0;
        }

        .category-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 12px;
        }

        .category-info { flex: 1; }

        .category-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .category-amount {
            font-size: 14px;
            color: #666;
        }

        .progress {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: transform 0.2s, box-shadow 0.2s;
            z-index: 1000;
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.5);
        }

        .fab:active {
            transform: scale(0.95);
        }

        .fab svg {
            width: 28px;
            height: 28px;
            stroke: white;
            stroke-width: 3;
        }

        /* Category Colors */
        .cat-food { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .cat-transport { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .cat-shopping { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
        .cat-entertainment { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        .cat-bills { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }
        .cat-health { background: linear-gradient(135deg, #fdcbf1 0%, #e6dee9 100%); }
        .cat-other { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); }

        @media (max-width: 640px) {
            body { padding: 12px; padding-bottom: 100px; }
            h1 { font-size: 24px; }
            .amount { font-size: 36px; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Expense Tracker</h1>

        <div class="card">
            <h3>This Week</h3>
            <div class="amount" id="weekAmount">$0.00</div>
            <div class="subtitle" id="weekCount">0 transactions</div>
        </div>

        <div class="card">
            <h3>This Month</h3>
            <div class="amount" id="monthAmount">$0.00</div>
            <div class="subtitle" id="monthCount">0 transactions</div>
        </div>

        <div class="card">
            <h3>Spending by Category</h3>
            <div id="categories"></div>
        </div>

        <div class="card">
            <h3>All Transactions</h3>
            <div id="transactions"></div>
        </div>
    </div>

    <button class="fab" onclick="alert('Quick Add Expense - Coming Soon!')">
        <svg viewBox="0 0 24 24" fill="none">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <script>
        const CATEGORY_CONFIG = {
            'Food & Dining': { icon: '🍔', class: 'cat-food' },
            'Transportation': { icon: '🚗', class: 'cat-transport' },
            'Shopping': { icon: '🛍️', class: 'cat-shopping' },
            'Entertainment': { icon: '🎬', class: 'cat-entertainment' },
            'Bills & Utilities': { icon: '💡', class: 'cat-bills' },
            'Health': { icon: '💊', class: 'cat-health' },
            'Other': { icon: '📌', class: 'cat-other' }
        };

        const CATEGORY_COLORS = {
            'Food & Dining': '#84fab0',
            'Transportation': '#a8edea',
            'Shopping': '#ffecd2',
            'Entertainment': '#ff9a9e',
            'Bills & Utilities': '#fbc2eb',
            'Health': '#fdcbf1',
            'Other': '#e0c3fc'
        };

        fetch('data/expenses.json')
            .then(r => r.json())
            .then(data => {
                const txns = (data.transactions || []).sort((a, b) => new Date(b.date) - new Date(a.date));

                const now = new Date();
                const weekStart = new Date(now);
                weekStart.setDate(now.getDate() - 7);
                const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

                const weekTxns = txns.filter(t => new Date(t.date) >= weekStart);
                const monthTxns = txns.filter(t => new Date(t.date) >= monthStart);

                const weekTotal = weekTxns.reduce((sum, t) => sum + t.amount, 0);
                const monthTotal = monthTxns.reduce((sum, t) => sum + t.amount, 0);
                const allTotal = txns.reduce((sum, t) => sum + t.amount, 0);

                document.getElementById('weekAmount').textContent = '$' + weekTotal.toFixed(2);
                document.getElementById('weekCount').textContent = weekTxns.length + ' transactions';
                document.getElementById('monthAmount').textContent = '$' + monthTotal.toFixed(2);
                document.getElementById('monthCount').textContent = monthTxns.length + ' transactions';

                // Transactions with icons
                document.getElementById('transactions').innerHTML = txns.map(t => {
                    const date = new Date(t.date);
                    const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    const config = CATEGORY_CONFIG[t.category] || CATEGORY_CONFIG['Other'];

                    return `<div class="transaction">
                        <div class="transaction-icon ${config.class}">${config.icon}</div>
                        <div class="transaction-details">
                            <div class="transaction-title">${t.description}</div>
                            <div class="transaction-meta">${t.category} • ${t.paymentMethod} • ${dateStr}</div>
                        </div>
                        <div class="transaction-amount">$${t.amount.toFixed(2)}</div>
                    </div>`;
                }).join('');

                // Categories with icons and colored progress bars
                const cats = {};
                txns.forEach(t => cats[t.category] = (cats[t.category] || 0) + t.amount);

                document.getElementById('categories').innerHTML = Object.entries(cats)
                    .sort((a, b) => b[1] - a[1])
                    .map(([cat, amt]) => {
                        const config = CATEGORY_CONFIG[cat] || CATEGORY_CONFIG['Other'];
                        const color = CATEGORY_COLORS[cat] || CATEGORY_COLORS['Other'];
                        const pct = (amt/allTotal*100).toFixed(0);

                        return `<div class="category-item">
                            <div class="category-icon ${config.class}">${config.icon}</div>
                            <div class="category-info">
                                <div class="category-name">${cat}</div>
                                <div class="category-amount">$${amt.toFixed(2)} (${pct}%)</div>
                                <div class="progress">
                                    <div class="bar" style="width: ${pct}%; background: ${color};"></div>
                                </div>
                            </div>
                        </div>`;
                    }).join('');
            })
            .catch(err => {
                document.body.innerHTML += '<div class="card"><strong>Error:</strong> ' + err.message + '</div>';
            });
    </script>
</body>
</html>

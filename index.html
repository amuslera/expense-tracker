<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Spentzy - Track your weekly expenses">
    <title>This Week - Spentzy</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="header__title">THIS WEEK</h1>
            <p class="header__date-range" data-date-range></p>
            <button class="header__filter-btn" aria-label="Filter">
                <svg class="icon icon--filter" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M3 6h18M7 12h10M11 18h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </header>

        <!-- Summary Cards -->
        <section class="summary">
            <div class="summary__card summary__card--primary">
                <h2 class="summary__label">This Week</h2>
                <p class="summary__amount" data-week-total></p>
                <p class="summary__meta" data-week-transactions></p>
            </div>

            <div class="summary__card summary__card--secondary">
                <h2 class="summary__label">This Month</h2>
                <p class="summary__amount" data-month-total></p>
                <p class="summary__meta" data-month-transactions></p>
            </div>
        </section>

        <!-- Spending by Category -->
        <section class="spending-categories">
            <h2 class="section-title">Spending by Category</h2>
            <div class="category-list" data-category-list>
                <!-- Categories will be populated by JavaScript -->
            </div>
        </section>

        <!-- Floating Action Button -->
        <button class="fab" aria-label="Add transaction">
            <svg class="icon icon--plus" width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="bottom-nav__item bottom-nav__item--active" aria-current="page">
                <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span class="bottom-nav__label">This Week</span>
            </a>
            <a href="expenses.html" class="bottom-nav__item">
                <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v14a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2"/>
                    <path d="M9 7h6M9 12h6M9 17h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span class="bottom-nav__label">Expenses</span>
            </a>
            <a href="analytics.html" class="bottom-nav__item">
                <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M3 3v18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M7 16l4-4 4 4 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="bottom-nav__label">Analytics</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/thisweek.js"></script>
</body>
</html>

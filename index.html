<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Expense Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #16161E;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
            color: #F0F0F5;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        /* App Header */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            margin-bottom: 20px;
        }

        .app-header__title {
            font-size: 20px;
            font-weight: 700;
            color: #F0F0F5;
        }

        .app-header__right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-header__add {
            display: none;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #26263A;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #8888A0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .app-header__add:hover {
            background: #2E2E42;
            color: #F0F0F5;
        }

        .app-header__avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #26263A;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #55556A;
        }

        .app-header__avatar svg {
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        /* Period Filter */
        .period-filter {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #1E1E2A;
            padding: 12px;
            border-radius: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .period-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 16px;
            background: #26263A;
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #8888A0;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .period-btn:hover {
            background: #2E2E42;
            color: #F0F0F5;
        }

        .period-btn.active {
            background: #7C5CFC;
            color: white;
            border-color: #7C5CFC;
        }

        /* Custom Date Picker Modal */
        .date-picker-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .date-picker-modal.active {
            display: flex;
        }

        .date-picker-content {
            background: #1E1E2A;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
        }

        .date-picker-content h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #F0F0F5;
        }

        .date-input-group {
            margin-bottom: 16px;
        }

        .date-input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #8888A0;
            margin-bottom: 8px;
        }

        .date-input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #2E2E42;
            border-radius: 8px;
            font-size: 16px;
            color: #F0F0F5;
            background: #26263A;
        }

        .date-picker-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .date-picker-actions button {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .date-picker-actions .btn-cancel {
            background: #26263A;
            color: #8888A0;
        }

        .date-picker-actions .btn-cancel:hover {
            background: #2E2E42;
        }

        .date-picker-actions .btn-apply {
            background: #7C5CFC;
            color: white;
        }

        .date-picker-actions .btn-apply:hover {
            background: #9B85FC;
        }

        /* Sync Status */
        .sync-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 0 4px;
            font-size: 12px;
            color: #55556A;
        }

        .sync-status svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            cursor: pointer;
            transition: color 0.2s;
        }

        .sync-status svg:hover {
            color: #8888A0;
        }

        .sync-status.syncing svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card {
            background: #1E1E2A;
            padding: 24px;
            margin: 16px 0;
            border-radius: 16px;
        }

        .card h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #8888A0;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .period-label {
            color: #55556A;
            font-weight: 500;
        }

        .amount {
            font-size: 42px;
            font-weight: 700;
            color: #F0F0F5;
            margin: 8px 0;
        }

        .subtitle {
            color: #8888A0;
            font-size: 14px;
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }

        /* Transaction List */
        .transaction {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #2E2E42;
            min-height: 80px;
            cursor: pointer;
            transition: background 0.2s, transform 0.3s;
            border-radius: 8px;
            margin-bottom: 4px;
            position: relative;
            overflow: hidden;
        }

        .transaction-container {
            position: relative;
        }

        .transaction-swipe-actions {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            background: #FF4D4D;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.3s;
            cursor: pointer;
            gap: 12px;
            user-select: none;
        }

        .swipe-confirm-yes,
        .swipe-confirm-no {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            cursor: pointer;
        }

        .swipe-confirm-yes {
            background: white;
            color: #FF4D4D;
        }

        .swipe-confirm-no {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .transaction.swiping {
            transition: transform 0.1s;
        }

        .transaction.show-delete .transaction-swipe-actions {
            opacity: 1;
        }

        .transaction:last-child {
            border-bottom: none;
        }

        .transaction:hover {
            background: #26263A;
        }

        .transaction:active {
            background: #26263A;
        }

        .transaction-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin-right: 16px;
            flex-shrink: 0;
        }

        .transaction-details {
            flex: 1;
            min-width: 0;
        }

        .transaction-title {
            font-weight: 500;
            font-size: 16px;
            color: #F0F0F5;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .transaction-meta {
            font-size: 12px;
            color: #8888A0;
        }

        .transaction-amount {
            font-weight: 600;
            font-size: 18px;
            color: #F0F0F5;
            text-align: right;
        }

        /* Date Separator */
        .date-separator {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px 4px;
        }

        .date-separator::before,
        .date-separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2E2E42;
        }

        .date-separator span {
            font-size: 11px;
            font-weight: 600;
            color: #8888A0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            position: relative;
            background: #1E1E2A;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 24px 24px 16px 24px;
            border-bottom: 1px solid #2E2E42;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .modal-header .transaction-icon {
            margin-right: 0;
        }

        .modal-title-group {
            flex: 1;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #F0F0F5;
            margin-bottom: 4px;
        }

        .modal-category {
            font-size: 14px;
            color: #8888A0;
        }

        .modal-close {
            background: #26263A;
            border: none;
            border-radius: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #8888A0;
            font-size: 24px;
            line-height: 1;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #2E2E42;
            color: #F0F0F5;
        }

        .modal-body {
            padding: 24px;
        }


        .modal-actions {
            padding: 16px 24px 24px 24px;
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-edit {
            background: #26263A;
            color: #8888A0;
        }

        .btn-edit:hover {
            background: #2E2E42;
            color: #F0F0F5;
        }

        .btn-delete {
            background: rgba(255, 77, 77, 0.15);
            color: #FF4D4D;
        }

        .btn-delete:hover {
            background: rgba(255, 77, 77, 0.25);
            color: #FF4D4D;
        }

        .btn-delete:active {
            transform: scale(0.98);
        }


        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #8888A0;
            margin-bottom: 8px;
        }

        .form-input,
        .form-select {
            width: 100%;
            padding: 12px;
            border: 2px solid #2E2E42;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            color: #F0F0F5;
            background: #26263A;
            transition: all 0.2s;
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #7C5CFC;
            box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.15);
        }

        .btn-primary {
            background: #7C5CFC;
            color: white;
        }

        .btn-primary:hover {
            background: #9B85FC;
        }

        .btn-secondary {
            background: #26263A;
            color: #8888A0;
        }

        .btn-secondary:hover {
            background: #2E2E42;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 88px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #7C5CFC;
            box-shadow: 0 4px 12px rgba(124, 92, 252, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            z-index: 1000;
        }

        .fab:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(124, 92, 252, 0.5);
            background: #9B85FC;
        }

        .fab:active {
            transform: scale(0.95);
        }

        .fab svg {
            width: 20px;
            height: 20px;
            stroke: white;
            stroke-width: 2.5;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1E1E2A;
            z-index: 1500;
            border-top: 1px solid #2E2E42;
        }

        .bottom-nav-wrapper {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            cursor: pointer;
            text-decoration: none;
            color: #55556A;
            transition: all 0.2s;
            min-height: 64px;
            justify-content: center;
            border-radius: 8px;
            max-width: 120px;
        }

        .nav-item:hover {
            background: #26263A;
            color: #8888A0;
        }

        .nav-item.active {
            color: #7C5CFC;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .nav-item span {
            font-size: 12px;
            font-weight: 600;
        }

        /* Category Colors - Dark Tinted */
        .cat-food { background: rgba(134, 239, 172, 0.15); }
        .cat-transport { background: rgba(147, 197, 253, 0.15); }
        .cat-shopping { background: rgba(252, 211, 77, 0.15); }
        .cat-entertainment { background: rgba(249, 168, 212, 0.15); }
        .cat-bills { background: rgba(196, 181, 253, 0.15); }
        .cat-health { background: rgba(252, 165, 165, 0.15); }
        .cat-other { background: rgba(203, 213, 225, 0.15); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #55556A;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            stroke: #55556A;
            stroke-width: 2;
            margin: 0 auto 16px;
        }

        .empty-state p {
            margin-top: 8px;
            font-size: 15px;
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
                padding-bottom: 88px;
            }
            .amount {
                font-size: 36px;
            }
            .card {
                padding: 20px;
            }
            .period-filter {
                padding: 8px;
                gap: 6px;
            }
            .period-btn {
                min-width: 70px;
                padding: 8px 12px;
                font-size: 13px;
            }
            .fab {
                bottom: 78px;
                right: 16px;
                width: 44px;
                height: 44px;
            }
            .modal-content {
                margin: 0 12px;
            }
            .modal-amount {
                font-size: 28px;
            }
        }

        @media (min-width: 641px) {
            .fab {
                display: none;
            }
            .app-header__add {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- App Header -->
        <div class="app-header">
            <div class="app-header__title">JJ Gasto</div>
            <div class="app-header__right">
                <button class="app-header__add" onclick="showAddExpense()">+ Add manually</button>
                <div class="app-header__avatar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Period Filter -->
        <div class="period-filter">
            <button class="period-btn" data-period="week">This Week</button>
            <button class="period-btn active" data-period="month">This Month</button>
            <button class="period-btn" data-period="year">This Year</button>
            <button class="period-btn" data-period="all">All Time</button>
            <button class="period-btn" onclick="openCustomDatePicker()">Custom</button>
        </div>

        <!-- Sync Status -->
        <div class="sync-status" id="syncStatus">
            <span id="syncText">Syncing...</span>
            <svg viewBox="0 0 24 24" onclick="loadData()" title="Refresh">
                <path d="M23 4v6h-6"></path>
                <path d="M1 20v-6h6"></path>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
        </div>

        <!-- Summary Card -->
        <div class="card">
            <h3>Overview<span class="period-label"></span></h3>
            <div class="amount" id="totalAmount">$0.00</div>
            <div class="subtitle" id="totalCount">0 transactions</div>
        </div>

        <!-- Category Breakdown with Donut Chart -->
        <div class="card">
            <h3>Spending by Category<span class="period-label"></span></h3>
            <div class="chart-container">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <!-- All Transactions -->
        <div class="card">
            <h3>Transactions<span class="period-label"></span></h3>
            <div id="transactions"></div>
        </div>
    </div>

    <!-- Custom Date Picker Modal -->
    <div id="datePickerModal" class="date-picker-modal">
        <div class="date-picker-content">
            <h2>Custom Date Range</h2>
            <div class="date-input-group">
                <label for="customStartDate">From</label>
                <input type="date" id="customStartDate">
            </div>
            <div class="date-input-group">
                <label for="customEndDate">To</label>
                <input type="date" id="customEndDate">
            </div>
            <div class="date-picker-actions">
                <button class="btn-cancel" onclick="closeDatePicker()">Cancel</button>
                <button class="btn-apply" onclick="applyCustomDate()">Apply</button>
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" onclick="showAddExpense()" title="Add manually">
        <svg viewBox="0 0 24 24" fill="none">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="bottom-nav-wrapper">
            <a href="index.html" class="nav-item active">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="analytics.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <line x1="12" y1="20" x2="12" y2="10"></line>
                    <line x1="18" y1="20" x2="18" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="16"></line>
                </svg>
                <span>Analytics</span>
            </a>
            <a href="settings.html" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M12 1v6m0 6v6m8.66-15.66l-4.24 4.24m-8.49 8.49l-4.24 4.24M23 12h-6M7 12H1m20.66 8.66l-4.24-4.24m-8.49-8.49l-4.24-4.24"></path>
                </svg>
                <span>Settings</span>
            </a>
        </div>
    </div>

    <!-- Transaction Detail Modal -->
    <div class="modal" id="transactionModal">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <div class="transaction-icon" id="modalIcon"></div>
                <div class="modal-title-group">
                    <div class="modal-title" id="modalTitle"></div>
                    <div class="modal-category" id="modalCategory"></div>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="editDescription">Description</label>
                    <input type="text" id="editDescription" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editAmount">Amount</label>
                    <input type="number" id="editAmount" class="form-input" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editCategory">Category</label>
                    <select id="editCategory" class="form-select" required>
                        <option value="Food & Dining">Food & Dining</option>
                        <option value="Transportation">Transportation</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Bills & Utilities">Bills & Utilities</option>
                        <option value="Health">Health</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editPaymentMethod">Payment Method</label>
                    <select id="editPaymentMethod" class="form-select" required>
                        <option value="Card">Card</option>
                        <option value="Cash">Cash</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="editDate">Date</label>
                    <input type="date" id="editDate" class="form-input" required>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-delete" id="modalDeleteBtn" onclick="deleteCurrentTransaction()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    Delete
                </button>
                <button class="btn btn-primary" onclick="saveTransaction()">Save</button>
            </div>
        </div>
    </div>

    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Category Configuration - Muted, Professional Colors
        const CATEGORY_CONFIG = {
            'Food & Dining': { icon: '🍔', class: 'cat-food', color: '#86efac' },
            'Transportation': { icon: '🚗', class: 'cat-transport', color: '#93c5fd' },
            'Shopping': { icon: '🛍️', class: 'cat-shopping', color: '#fcd34d' },
            'Entertainment': { icon: '🎬', class: 'cat-entertainment', color: '#f9a8d4' },
            'Bills & Utilities': { icon: '💡', class: 'cat-bills', color: '#c4b5fd' },
            'Health': { icon: '💊', class: 'cat-health', color: '#fca5a5' },
            'Other': { icon: '📌', class: 'cat-other', color: '#cbd5e1' }
        };

        // Supabase
        const SUPABASE_URL = 'https://mkcscqxbezbicpyduowy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rY3NjcXhiZXpiaWNweWR1b3d5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2NTkxOTIsImV4cCI6MjA4NzIzNTE5Mn0.K3773WkG-uNYts-2utFQnyvR-U5CaCURQfZ7_qFdcow';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function mapFromSupabase(row) {
            return {
                id: row.id,
                amount: Number(row.amount),
                currency: row.currency,
                category: row.category,
                description: row.description,
                paymentMethod: row.payment_method,
                date: row.date,
                source: row.source,
                status: row.status,
                createdAt: row.created_at
            };
        }

        function mapToSupabase(t) {
            return {
                id: t.id,
                amount: t.amount,
                currency: t.currency || 'USD',
                category: t.category,
                description: t.description,
                payment_method: t.paymentMethod,
                date: t.date,
                source: t.source,
                status: t.status || 'confirmed',
                created_at: t.createdAt
            };
        }

        let allTransactions = [];
        let currentPeriod = 'month';
        let customStartDate = null;
        let customEndDate = null;
        let categoryChart = null;
        let currentTransactionId = null;
        let lastSyncTime = null;

        // Load and display data from Supabase
        async function loadData() {
            updateSyncStatus('syncing');
            try {
                const { data, error } = await sb
                    .from('transactions')
                    .select('*')
                    .order('date', { ascending: false });
                if (error) throw error;
                allTransactions = (data || []).map(mapFromSupabase);
                lastSyncTime = new Date();
                updateSyncStatus('done');
                updateDisplay();
            } catch (err) {
                console.error('Error loading data from Supabase:', err);
                updateSyncStatus('error');
            }
        }

        loadData();

        // Real-time subscription — updates UI when data changes
        sb.channel('transactions-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'transactions' }, () => loadData())
            .subscribe();

        // Period filter handlers
        document.querySelectorAll('.period-btn[data-period]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPeriod = this.dataset.period;
                updateDisplay();
            });
        });

        function openCustomDatePicker() {
            document.getElementById('datePickerModal').classList.add('active');
        }

        function closeDatePicker() {
            document.getElementById('datePickerModal').classList.remove('active');
        }

        function applyCustomDate() {
            const start = document.getElementById('customStartDate').value;
            const end = document.getElementById('customEndDate').value;
            if (!start || !end) { alert('Please select both dates'); return; }
            customStartDate = new Date(start + 'T00:00:00');
            customEndDate = new Date(end + 'T23:59:59.999');
            currentPeriod = 'custom';
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.period-btn')[4].classList.add('active');
            closeDatePicker();
            updateDisplay();
        }

        // Parse transaction date consistently as local time
        function parseLocalDate(dateStr) {
            if (typeof dateStr === 'string' && dateStr.length === 10) {
                return new Date(dateStr + 'T12:00:00');
            }
            return new Date(dateStr);
        }

        function getPeriodLabel() {
            switch (currentPeriod) {
                case 'week': return 'This Week';
                case 'month': return 'This Month';
                case 'year': return 'This Year';
                case 'all': return 'All Time';
                case 'custom':
                    if (customStartDate && customEndDate) {
                        const opts = { month: 'short', day: 'numeric', year: 'numeric' };
                        const s = customStartDate.toLocaleDateString('en-US', opts);
                        const e = customEndDate.toLocaleDateString('en-US', opts);
                        return s === e ? s : s + ' – ' + e;
                    }
                    return 'Custom';
                default: return '';
            }
        }

        function updatePeriodLabels() {
            const label = getPeriodLabel();
            document.querySelectorAll('.period-label').forEach(el => {
                el.textContent = label ? ' · ' + label : '';
            });
        }

        function updateDisplay() {
            updatePeriodLabels();
            const filtered = filterTransactionsByPeriod(allTransactions, currentPeriod);
            updateSummary(filtered);
            updateCategoryChart(filtered);
            updateTransactionList(filtered);
        }

        function filterTransactionsByPeriod(transactions, period) {
            const now = new Date();

            switch(period) {
                case 'week':
                    const weekStart = new Date(now);
                    weekStart.setDate(now.getDate() - 7);
                    return transactions.filter(t => parseLocalDate(t.date) >= weekStart);

                case 'month':
                    const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
                    return transactions.filter(t => parseLocalDate(t.date) >= monthStart);

                case 'year':
                    const yearStart = new Date(now.getFullYear(), 0, 1);
                    return transactions.filter(t => parseLocalDate(t.date) >= yearStart);

                case 'custom':
                    return transactions.filter(t => {
                        const d = parseLocalDate(t.date);
                        return d >= customStartDate && d <= customEndDate;
                    });

                case 'all':
                default:
                    return transactions;
            }
        }

        function updateSummary(transactions) {
            const total = transactions.reduce((sum, t) => sum + t.amount, 0);
            const count = transactions.length;

            const titles = {
                'week': 'This Week',
                'month': 'This Month',
                'year': 'This Year',
                'all': 'All Time',
                'custom': 'Custom Range'
            };

            document.getElementById('totalAmount').textContent = '$' + total.toFixed(2);
            document.getElementById('totalCount').textContent = count + ' transaction' + (count !== 1 ? 's' : '') + ' · ' + titles[currentPeriod];
        }

        function updateCategoryChart(transactions) {
            // Calculate category totals
            const categoryTotals = {};
            transactions.forEach(t => {
                categoryTotals[t.category] = (categoryTotals[t.category] || 0) + t.amount;
            });

            const categories = Object.keys(categoryTotals).sort((a, b) =>
                categoryTotals[b] - categoryTotals[a]
            );
            const amounts = categories.map(cat => categoryTotals[cat]);
            const colors = categories.map(cat => CATEGORY_CONFIG[cat]?.color || CATEGORY_CONFIG['Other'].color);
            const total = amounts.reduce((sum, val) => sum + val, 0);

            // Destroy existing chart
            if (categoryChart) {
                categoryChart.destroy();
            }

            const ctx = document.getElementById('categoryChart');

            if (categories.length === 0) {
                ctx.parentElement.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg><p>No transactions for this period</p></div>';
                return;
            }

            categoryChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: categories,
                    datasets: [{
                        data: amounts,
                        backgroundColor: colors,
                        borderColor: '#fff',
                        borderWidth: 3,
                        hoverOffset: 10,
                        hoverBorderColor: '#fff',
                        hoverBorderWidth: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 15,
                                usePointStyle: true,
                                pointStyle: 'circle',
                                font: { size: 12, family: '-apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif' },
                                color: '#8888A0',
                                generateLabels: function(chart) {
                                    const data = chart.data;
                                    if (data.labels.length && data.datasets.length) {
                                        return data.labels.map((label, i) => {
                                            const value = data.datasets[0].data[i];
                                            const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                                            return {
                                                text: `${label} (${percentage}%)`,
                                                fillStyle: data.datasets[0].backgroundColor[i],
                                                hidden: false,
                                                index: i
                                            };
                                        });
                                    }
                                    return [];
                                }
                            }
                        },
                        tooltip: {
                            backgroundColor: '#26263A',
                            titleColor: '#F0F0F5',
                            bodyColor: '#F0F0F5',
                            padding: 12,
                            borderWidth: 1,
                            borderColor: '#2E2E42',
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    const value = context.parsed;
                                    const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                                    return [
                                        `Amount: $${value.toFixed(2)}`,
                                        `Percentage: ${percentage}%`
                                    ];
                                }
                            }
                        }
                    },
                    animation: {
                        animateRotate: true,
                        animateScale: true,
                        duration: 1000,
                        easing: 'easeInOutQuart'
                    }
                },
                plugins: [{
                    id: 'centerText',
                    beforeDraw: function(chart) {
                        const width = chart.width;
                        const height = chart.height;
                        const ctx = chart.ctx;
                        ctx.restore();

                        // Fill center of donut with card bg
                        const meta = chart.getDatasetMeta(0);
                        if (meta.data.length > 0) {
                            const el = meta.data[0];
                            ctx.beginPath();
                            ctx.arc(el.x, el.y, el.innerRadius, 0, 2 * Math.PI);
                            ctx.fillStyle = '#1E1E2A';
                            ctx.fill();
                        }

                        const fontSize = (height / 200).toFixed(2);
                        ctx.font = `bold ${fontSize}em sans-serif`;
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = '#F0F0F5';

                        const totalText = '$' + total.toFixed(0);
                        const textX = Math.round((width - ctx.measureText(totalText).width) / 2);
                        const textY = height / 2 - 10;

                        ctx.fillText(totalText, textX, textY);

                        // Subtitle
                        ctx.font = `${fontSize * 0.5}em sans-serif`;
                        ctx.fillStyle = '#8888A0';
                        const subtitleText = 'Total Spent';
                        const subtitleX = Math.round((width - ctx.measureText(subtitleText).width) / 2);
                        ctx.fillText(subtitleText, subtitleX, textY + 25);

                        ctx.save();
                    }
                }]
            });
        }

        function updateTransactionList(transactions) {
            const container = document.getElementById('transactions');

            if (transactions.length === 0) {
                container.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg><p>No transactions for this period</p></div>';
                return;
            }

            // Group transactions by date
            const grouped = [];
            let lastDateKey = null;
            transactions.forEach(t => {
                const date = new Date(t.date);
                const dateKey = date.toLocaleDateString('en-US', {
                    month: 'short', day: 'numeric', year: 'numeric'
                });
                if (dateKey !== lastDateKey) {
                    grouped.push({ type: 'separator', dateStr: dateKey });
                    lastDateKey = dateKey;
                }
                grouped.push({ type: 'transaction', data: t });
            });

            container.innerHTML = grouped.map(item => {
                if (item.type === 'separator') {
                    return `<div class="date-separator"><span>${item.dateStr.toUpperCase()}</span></div>`;
                }
                const t = item.data;
                const config = CATEGORY_CONFIG[t.category] || CATEGORY_CONFIG['Other'];
                return `<div class="transaction-container">
                    <div class="transaction-swipe-actions">Delete</div>
                    <div class="transaction" data-id="${t.id}" onclick="showTransactionDetail('${t.id}')">
                        <div class="transaction-icon ${config.class}">${config.icon}</div>
                        <div class="transaction-details">
                            <div class="transaction-title">${escapeHtml(t.description)}</div>
                            <div class="transaction-meta">${t.category} • ${t.paymentMethod}</div>
                        </div>
                        <div class="transaction-amount">$${t.amount.toFixed(2)}</div>
                    </div>
                </div>`;
            }).join('');

            // Add swipe handlers to all transactions
            initSwipeHandlers();
        }

        let lastSwipeTime = 0;

        function initSwipeHandlers() {
            const transactions = document.querySelectorAll('.transaction');

            transactions.forEach(transaction => {
                let startX = 0;
                let currentX = 0;
                let isDragging = false;

                transaction.addEventListener('touchstart', (e) => {
                    dismissAllSwipes();
                    startX = e.touches[0].clientX;
                    currentX = startX;
                    isDragging = true;
                    transaction.classList.add('swiping');
                });

                transaction.addEventListener('touchmove', (e) => {
                    if (!isDragging) return;

                    currentX = e.touches[0].clientX;
                    const diff = startX - currentX;
                    const container = transaction.closest('.transaction-container');
                    const isRevealed = container.classList.contains('show-delete');

                    if (isRevealed && diff < 0) {
                        // Already revealed: swipe right to dismiss
                        const closeDist = Math.min(Math.abs(diff), 100);
                        transaction.style.transform = `translateX(-${100 - closeDist}px)`;
                    } else if (!isRevealed && diff > 0) {
                        // Swiping left to reveal
                        transaction.style.transform = `translateX(-${Math.min(diff, 100)}px)`;
                    }
                });

                transaction.addEventListener('touchend', (e) => {
                    if (!isDragging) return;
                    isDragging = false;
                    transaction.classList.remove('swiping');

                    const diff = startX - currentX;
                    const container = transaction.closest('.transaction-container');
                    const isRevealed = container.classList.contains('show-delete');

                    if (isRevealed && diff < -40) {
                        // Swiped right enough to dismiss
                        dismissSwipe(container, transaction);
                    } else if (isRevealed) {
                        // Still revealed, snap back to revealed position
                        transaction.style.transform = 'translateX(-100px)';
                    } else if (diff > 80) {
                        // Swiped left far enough to reveal delete
                        e.preventDefault();
                        lastSwipeTime = Date.now();
                        transaction.style.transform = 'translateX(-100px)';
                        container.classList.add('show-delete');
                    } else {
                        // Not far enough, snap back
                        transaction.style.transform = 'translateX(0)';
                    }
                });
            });

            // Click handlers for swipe delete buttons
            document.querySelectorAll('.transaction-swipe-actions').forEach(action => {
                action.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (action.dataset.confirming) return;

                    const container = action.closest('.transaction-container');
                    const transactionEl = container.querySelector('.transaction');
                    const id = transactionEl.dataset.id;

                    // Show inline confirmation
                    action.dataset.confirming = 'true';
                    action.innerHTML = `
                        <span>Delete?</span>
                        <button class="swipe-confirm-yes">Yes</button>
                        <button class="swipe-confirm-no">No</button>
                    `;

                    action.querySelector('.swipe-confirm-yes').addEventListener('click', (ev) => {
                        ev.stopPropagation();
                        deleteTransactionById(id);
                    });

                    action.querySelector('.swipe-confirm-no').addEventListener('click', (ev) => {
                        ev.stopPropagation();
                        resetSwipeAction(action);
                        dismissSwipe(container, transactionEl);
                    });
                });
            });

            // Dismiss on tap outside (register once)
            if (!initSwipeHandlers._bound) {
                initSwipeHandlers._bound = true;
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.transaction-swipe-actions')) {
                        dismissAllSwipes();
                    }
                });
            }
        }

        function dismissSwipe(container, transactionEl) {
            transactionEl.style.transform = 'translateX(0)';
            container.classList.remove('show-delete');
            const action = container.querySelector('.transaction-swipe-actions');
            resetSwipeAction(action);
        }

        function resetSwipeAction(action) {
            action.innerHTML = 'Delete';
            delete action.dataset.confirming;
        }

        function dismissAllSwipes() {
            document.querySelectorAll('.transaction-container.show-delete').forEach(container => {
                const transactionEl = container.querySelector('.transaction');
                dismissSwipe(container, transactionEl);
            });
        }

        function showTransactionDetail(id) {
            // If swipe just happened or is active, dismiss instead of opening modal
            if (Date.now() - lastSwipeTime < 400) return;
            const clickedEl = document.querySelector(`.transaction[data-id="${id}"]`);
            const container = clickedEl?.closest('.transaction-container');
            if (container?.classList.contains('show-delete')) {
                dismissSwipe(container, clickedEl);
                return;
            }

            const transaction = allTransactions.find(t => t.id === id);
            if (!transaction) return;

            currentTransactionId = id;
            const config = CATEGORY_CONFIG[transaction.category] || CATEGORY_CONFIG['Other'];

            // Set modal icon and title
            document.getElementById('modalIcon').className = `transaction-icon ${config.class}`;
            document.getElementById('modalIcon').textContent = config.icon;
            document.getElementById('modalTitle').textContent = 'Edit Transaction';

            // Populate form fields
            document.getElementById('editDescription').value = transaction.description;
            document.getElementById('editAmount').value = transaction.amount;
            document.getElementById('editCategory').value = transaction.category;
            document.getElementById('editPaymentMethod').value = transaction.paymentMethod;

            // Convert ISO date to YYYY-MM-DD format for input[type="date"]
            const dateObj = new Date(transaction.date);
            const yyyy = dateObj.getFullYear();
            const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
            const dd = String(dateObj.getDate()).padStart(2, '0');
            document.getElementById('editDate').value = `${yyyy}-${mm}-${dd}`;

            // Show delete button in edit mode
            document.getElementById('modalDeleteBtn').style.display = '';

            // Show modal
            document.getElementById('transactionModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('transactionModal').classList.remove('active');
            currentTransactionId = null;
        }

        async function saveTransaction() {
            // Get form values
            const description = document.getElementById('editDescription').value.trim();
            const amount = parseFloat(document.getElementById('editAmount').value);
            const category = document.getElementById('editCategory').value;
            const paymentMethod = document.getElementById('editPaymentMethod').value;
            const date = document.getElementById('editDate').value;

            // Validate
            if (!description || !amount || amount <= 0 || !category || !paymentMethod || !date) {
                alert('Please fill in all fields correctly');
                return;
            }

            const transaction = currentTransactionId
                ? { ...allTransactions.find(t => t.id === currentTransactionId), description, amount, category, paymentMethod, date }
                : {
                    id: 'txn-' + Date.now(),
                    amount,
                    currency: 'USD',
                    category,
                    description,
                    paymentMethod,
                    date,
                    source: 'web',
                    status: 'confirmed',
                    createdAt: new Date().toISOString()
                };

            const { error } = await sb.from('transactions').upsert(mapToSupabase(transaction));
            if (error) {
                console.error('Error saving transaction:', error);
                showToast('Error saving transaction');
                return;
            }

            showToast(currentTransactionId ? 'Transaction updated' : 'Expense added');
            closeModal();
            loadData();
        }

        async function deleteCurrentTransaction() {
            if (!currentTransactionId) return;

            if (!confirm('Are you sure you want to delete this transaction?')) {
                return;
            }

            await deleteTransactionById(currentTransactionId);
            closeModal();
        }

        async function deleteTransactionById(id) {
            const { error } = await sb.from('transactions').delete().eq('id', id);
            if (error) {
                console.error('Error deleting transaction:', error);
                showToast('Error deleting transaction');
                return;
            }

            showToast('Transaction deleted');
            loadData();
        }

        function showAddExpense() {
            currentTransactionId = null;

            // Set modal for add mode
            const config = CATEGORY_CONFIG['Food & Dining'];
            document.getElementById('modalIcon').className = `transaction-icon ${config.class}`;
            document.getElementById('modalIcon').textContent = config.icon;
            document.getElementById('modalTitle').textContent = 'New Expense';
            document.getElementById('modalCategory').textContent = '';

            // Clear fields and set defaults
            document.getElementById('editDescription').value = '';
            document.getElementById('editAmount').value = '';
            document.getElementById('editCategory').value = 'Food & Dining';
            document.getElementById('editPaymentMethod').value = 'Card';

            // Default to today
            const now = new Date();
            const yyyy = now.getFullYear();
            const mm = String(now.getMonth() + 1).padStart(2, '0');
            const dd = String(now.getDate()).padStart(2, '0');
            document.getElementById('editDate').value = `${yyyy}-${mm}-${dd}`;

            // Hide delete button in add mode
            document.getElementById('modalDeleteBtn').style.display = 'none';

            // Show modal
            document.getElementById('transactionModal').classList.add('active');
        }

        function showPlaceholder(pageName) {
            alert(pageName + ' page coming soon!');
        }

        function showToast(message) {
            // Simple toast notification (you can enhance this)
            const toast = document.createElement('div');
            toast.style.cssText = 'position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #26263A; color: #F0F0F5; padding: 12px 24px; border-radius: 8px; z-index: 3000; font-size: 14px; border: 1px solid #2E2E42;';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function updateSyncStatus(state) {
            const statusEl = document.getElementById('syncStatus');
            const textEl = document.getElementById('syncText');
            if (!statusEl || !textEl) return;

            if (state === 'syncing') {
                statusEl.classList.add('syncing');
                textEl.textContent = 'Syncing...';
            } else if (state === 'error') {
                statusEl.classList.remove('syncing');
                textEl.textContent = 'Sync failed';
            } else {
                statusEl.classList.remove('syncing');
                textEl.textContent = 'Updated just now';
            }
        }

        function formatRelativeTime(date) {
            if (!date) return 'Never';
            const seconds = Math.floor((new Date() - date) / 1000);
            if (seconds < 10) return 'just now';
            if (seconds < 60) return seconds + 's ago';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + ' min ago';
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + 'h ago';
            return date.toLocaleDateString();
        }

        // Update the relative timestamp every 30s
        setInterval(() => {
            if (lastSyncTime) {
                const textEl = document.getElementById('syncText');
                const statusEl = document.getElementById('syncStatus');
                if (textEl && statusEl && !statusEl.classList.contains('syncing')) {
                    textEl.textContent = 'Updated ' + formatRelativeTime(lastSyncTime);
                }
            }
        }, 30000);

        // Fallback polling in case real-time subscription drops
        setInterval(() => {
            loadData();
        }, 300000);

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>

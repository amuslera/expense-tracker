<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        .card { background: white; padding: 20px; margin: 15px 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .amount { font-size: 48px; font-weight: bold; color: #4F7CFF; margin: 10px 0; }
        .subtitle { color: #999; font-size: 14px; }
        .transaction { border-bottom: 1px solid #eee; padding: 15px 0; }
        .transaction:last-child { border-bottom: none; }
        .progress { height: 24px; background: #eee; border-radius: 12px; overflow: hidden; margin: 10px 0; }
        .bar { height: 100%; background: #4F7CFF; }
    </style>
</head>
<body>
    <h1>💰 Expense Tracker</h1>

    <div class="card">
        <h3>This Week</h3>
        <div class="amount" id="weekAmount">$0.00</div>
        <div class="subtitle" id="weekCount">0 transactions</div>
    </div>

    <div class="card">
        <h3>This Month</h3>
        <div class="amount" id="monthAmount">$0.00</div>
        <div class="subtitle" id="monthCount">0 transactions</div>
    </div>

    <div class="card">
        <h3>Spending by Category</h3>
        <div id="categories"></div>
    </div>

    <div class="card">
        <h3>Recent Transactions</h3>
        <div id="transactions"></div>
    </div>

    <script>
        fetch('data/expenses.json')
            .then(r => r.json())
            .then(data => {
                const txns = data.transactions || [];
                const total = txns.reduce((sum, t) => sum + t.amount, 0);

                document.getElementById('weekAmount').textContent = '$' + total.toFixed(2);
                document.getElementById('weekCount').textContent = txns.length + ' transactions';
                document.getElementById('monthAmount').textContent = '$' + total.toFixed(2);
                document.getElementById('monthCount').textContent = txns.length + ' transactions';

                // Transactions
                document.getElementById('transactions').innerHTML = txns.map(t => 
                    `<div class="transaction">
                        <strong>${t.description}</strong> - <strong>$${t.amount.toFixed(2)}</strong><br>
                        <small>${t.category} • ${t.paymentMethod}</small>
                    </div>`
                ).join('');

                // Categories
                const cats = {};
                txns.forEach(t => cats[t.category] = (cats[t.category] || 0) + t.amount);
                
                document.getElementById('categories').innerHTML = Object.entries(cats)
                    .map(([cat, amt]) => 
                        `<div style="margin: 15px 0;">
                            <div><strong>${cat}</strong> - $${amt.toFixed(2)} (${(amt/total*100).toFixed(0)}%)</div>
                            <div class="progress"><div class="bar" style="width: ${amt/total*100}%"></div></div>
                        </div>`
                    ).join('');
            })
            .catch(err => {
                document.body.innerHTML += '<div class="card"><strong>Error:</strong> ' + err.message + '</div>';
            });
    </script>
</body>
</html>

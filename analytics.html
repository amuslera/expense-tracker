<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Spentzy - Analytics and insights">
    <title>Analytics - Spentzy</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="header__title">ANALYTICS</h1>
        </header>

        <!-- Weekly Spending Trend -->
        <section class="chart-section">
            <h2 class="section-title">Weekly Spending Trend</h2>
            <div class="chart-container">
                <canvas id="weeklyTrendChart" data-chart="weekly-trend"></canvas>
            </div>
        </section>

        <!-- Category Breakdown -->
        <section class="chart-section">
            <h2 class="section-title">Category Breakdown</h2>
            <div class="chart-container">
                <canvas id="categoryChart" data-chart="category-breakdown"></canvas>
            </div>
        </section>

        <!-- Monthly Comparison -->
        <section class="chart-section">
            <h2 class="section-title">Monthly Comparison</h2>
            <div class="chart-container">
                <canvas id="monthlyChart" data-chart="monthly-comparison"></canvas>
            </div>
        </section>

        <!-- Summary Statistics -->
        <section class="statistics">
            <h2 class="section-title">Summary Statistics</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <h3 class="stat-card__label">Average Daily Spend</h3>
                    <p class="stat-card__value" data-stat="avg-daily"></p>
                </div>

                <div class="stat-card">
                    <h3 class="stat-card__label">Most Expensive Day</h3>
                    <p class="stat-card__value" data-stat="max-day"></p>
                    <p class="stat-card__meta" data-stat="max-day-date"></p>
                </div>

                <div class="stat-card">
                    <h3 class="stat-card__label">Top Category</h3>
                    <p class="stat-card__value" data-stat="top-category"></p>
                    <p class="stat-card__meta" data-stat="top-category-amount"></p>
                </div>

                <div class="stat-card">
                    <h3 class="stat-card__label">Total Transactions</h3>
                    <p class="stat-card__value" data-stat="total-transactions"></p>
                </div>

                <div class="stat-card">
                    <h3 class="stat-card__label">This Week vs Last Week</h3>
                    <p class="stat-card__value" data-stat="week-comparison"></p>
                    <p class="stat-card__meta" data-stat="week-comparison-amount"></p>
                </div>

                <div class="stat-card">
                    <h3 class="stat-card__label">Spending Streak</h3>
                    <p class="stat-card__value" data-stat="streak"></p>
                    <p class="stat-card__meta">consecutive days</p>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <a href="index.html" class="bottom-nav__item">
                <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span class="bottom-nav__label">This Week</span>
            </a>
            <a href="expenses.html" class="bottom-nav__item">
                <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v14a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2"/>
                    <path d="M9 7h6M9 12h6M9 17h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span class="bottom-nav__label">Expenses</span>
            </a>
            <a href="analytics.html" class="bottom-nav__item bottom-nav__item--active" aria-current="page">
                <svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M3 3v18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <path d="M7 16l4-4 4 4 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="bottom-nav__label">Analytics</span>
            </a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/data.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/analytics.js"></script>
</body>
</html>
